<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcuradora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora">
    <div class="display" id="display"></div>
    <div class="buttons">   
        <button class="button azul-claro" onclick="limpar()">C</button>
        <button class="button azul-claro" onclick="inserir_operador('%')">%</button>
        <button class="button azul-claro" onclick="inserir_operador('.')">.</button>
        <button class="button azul-escuro" onclick="inserir_operador('/')">/</button>
        <button class="button branco" onclick="inserir_numero('7')">7</button>
        <button class="button branco" onclick="inserir_numero('8')">8</button>
        <button class="button branco" onclick="inserir_numero('9')">9</button>
        <button class="button azul-escuro" onclick="inserir_operador('*')">*</button>
        <button class="button branco" onclick="inserir_numero('4')">4</button>
        <button class="button branco" onclick="inserir_numero('5')">5</button>
        <button class="button branco" onclick="inserir_numero('6')">6</button>
        <button class="button azul-escuro" onclick="inserir_operador('-')">-</button>
        <button class="button branco" onclick="inserir_numero('1')">1</button>
        <button class="button branco" onclick="inserir_numero('2')">2</button>
        <button class="button branco" onclick="inserir_numero('3')">3</button>
        <button class="button azul-escuro" onclick="inserir_operador('+')">+</button>
        <button class="button branco" onclick="inserir_numero('0')">0</button>
        <button class="button azul-escuro" onclick="calcular()">=</button>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
